<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>
        .container{
            border: 2px solid black;
            display: grid;
            /* grid-template-columns: 120px 100px;
            grid-template-rows: 100px 100px 100px;   */
            
            row-gap: 2px;
            column-gap: 2px;
            grid-template-areas: "nav nav nav" 
                                 "side article article"
                                 "footer footer footer";

        }
        .item{
            border: 2px solid black;
            background-color: rgb(54, 163, 252);
            width: 40px;
            height: 40px;
        }

        .item1{
            grid-area: nav;
        }
        .itme2{
            grid-area: side;
        }
        .item3{
            grid-area: article;
        }
        .item4{
            grid-area: footer;
        }
        /* .item1{
            grid-row: 1/2;
            grid-column: 1/2;
        }
        .item5{
            grid-row: 1/2;
            grid-column: 1/2;
        } */
    </style>
</head>
<body>
    <div class="container">
        <div class="item item1">1</div>
        <div class="item item2">2</div>
        <div class="item itme3">3</div>
        <div class="item itme4">4</div>
        <div class="item item5">5</div>
    </div>
</body>
</html>
