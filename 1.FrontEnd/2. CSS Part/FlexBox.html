<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
</head>

<style>
    

    .container{
        width: 500px;
        height: 400px;
        border: 5px solid #5A639C;
        border-radius: 5px;
        background-color: #abaad0;

        /* flex property  */
        display: flex;
        /* flex-direction: column; */
        /* justify-content: center; */
        /* justify-content: space-around; */
        /* flex-direction: column-reverse; */
        /* flex-direction: row-reverse; */
        
        /* flex-wrap: wrap; */


    }

    .box{
        height: 50px;
        width: 50px;
        border: 5px solid #9B86BD;
        border-radius: 5px;
        background-color: #E2BBE9;
        margin: 2px;
    }

</style>

<body>
    <h1>Display Flex</h1>
    <br>
    <br>
    <br>
    
    <div class="container">
        <div class="box box1"><h2>1</h2></div>
        <div class="box box2"><h2>2</h2></div>
        <div class="box box3"><h2>3</h2></div>
        <div class="box box4"><h2>4</h2></div>
        <div class="box box5"><h2>5</h2></div>
        <div class="box box6"><h2>6</h2></div>
        <div class="box box7"><h2>7</h2></div>
        <div class="box box8"><h2>8</h2></div>
        <div class="box box9"><h2>9</h2></div>
    </div>
</body>
</html>
